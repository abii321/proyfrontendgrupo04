<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">

            <div class="card border-0 shadow-sm rounded-4">
                <div class="card-header bg-primary text-white text-center py-3 rounded-top-4">
                    <h4 class="mb-0 fw-bold"><i class="bi bi-calendar-plus me-2"></i>Agendar Tutoría</h4>
                </div>

                <div class="card-body p-4">
                    <p class="text-secondary text-center mb-4">Completá los detalles para solicitar una sesión con un
                        profesor.</p>

                    <form (ngSubmit)="enviarSolicitud()" #tutoriaForm="ngForm">

                        <div class="mb-3">
                            <label for="categoria" class="form-label fw-semibold text-dark">Materia / Categoría</label>
                            <select class="form-select" id="categoria" name="categoria_id"
                                [(ngModel)]="nuevaTutoria.categoria_id" required>
                                <option [value]="null" disabled selected>Seleccioná una categoría...</option>
                                <option *ngFor="let cat of categorias" [value]="cat.id">
                                    {{ cat.nombre }}
                                </option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label for="profesor" class="form-label fw-semibold text-dark">Profesor</label>
                            <select class="form-select" id="profesor" name="profesor_id"
                                [(ngModel)]="nuevaTutoria.profesor_id" required>
                                <option [value]="null" disabled selected>Elegí un profesor disponible...</option>
                                <option *ngFor="let prof of profesores" [value]="prof.id">
                                    {{ prof.nombre }} - ${{ prof.precioHora }}/hr
                                </option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label for="fecha" class="form-label fw-semibold text-dark">Fecha y Hora Propuesta</label>
                            <input type="datetime-local" class="form-control" id="fecha" name="fecha_hora"
                                [(ngModel)]="nuevaTutoria.fecha_hora" required>
                        </div>

                        <div class="mb-4">
                            <label for="archivo" class="form-label fw-semibold text-dark">Material de consulta
                                (Opcional)</label>
                            <input class="form-control" type="file" id="archivo" (change)="capturarArchivo($event)">
                        </div>

                        <div class="d-grid mt-4">
                            <button type="submit" class="btn btn-primary btn-lg fw-bold"
                                [disabled]="!tutoriaForm.valid">
                                Enviar Solicitud
                            </button>
                        </div>

                    </form>
                </div>
            </div>

        </div>
    </div>
</div>
