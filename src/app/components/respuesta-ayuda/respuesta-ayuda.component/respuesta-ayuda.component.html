<div class="container mt-4">

  <!-- Encabezado de la solicitud -->
  <h2 class="mb-3">{{solicitud.titulo}}</h2>

  <p class="lead">{{solicitud.descripcion}}</p>

  <div class="mb-3">
    <label for="precio" class="form-label"><strong>Precio:</strong></label>
    <input
      id="precio"
      type="number"
      class="form-control"
      min="1"
      step="1"
      placeholder="Ingrese el precio"
      [(ngModel)]="respuesta.precio"
      name="precio"
    />
  </div>

  <p>
    <strong>Estado:</strong>
    <span class="badge bg-info">{{solicitud.estado}}</span>
  </p>

  <hr class="my-4">

  <!-- Respuestas -->
  <h3 class="mb-3">Respuestas</h3>

  <div class="list-group mb-4">
    @for (r of solicitud.respuestas; track r.id) {
      <div class="list-group-item">
        {{r.respuesta}}
      </div>
    }
  </div>

  <hr class="my-4">

  <!-- Formulario de respuesta -->
  <h4 class="mb-3">Responder</h4>

  <div class="mb-3">
    <textarea
      class="form-control"
      rows="3"
      [(ngModel)]="respuesta.respuesta" name="respuesta">
    </textarea>
  </div>

  <button class="btn btn-primary" (click)="guardar()">
    <i class="bi bi-send"></i> Responder
  </button>

</div>
