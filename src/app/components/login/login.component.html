<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-sm-10 col-md-8 col-lg-5">
      <div class="card bg-body-secondary border-0 p-4 p-md-5 shadow-sm">
        <h3 class="fw-bold text-center mb-4">Iniciar Sesión</h3>

        <div id="googleLoginBtn" class="d-flex justify-content-center mb-3"></div>

        <div class="text-center text-muted small mb-3">O entra con tu correo</div>

        <form #loginForm="ngForm" (ngSubmit)="loginUsuario()">
          <div class="mb-3">
            <label for="email" class="form-label fw-semibold">Email</label>
            <input type="email" class="form-control" id="email" name="email" [(ngModel)]="email" required placeholder="ejemplo@test.com">
          </div>

          <div class="mb-4">
            <label for="password" class="form-label fw-semibold">Contraseña</label>
            <input type="password" class="form-control" id="password" name="password" [(ngModel)]="password" required placeholder="••••••••">
          </div>

          @if (msglogin) {
            <div class="alert alert-danger py-2 small">
              {{ msglogin }}
            </div>
          }

          <div class="d-flex align-items-center justify-content-between pt-2">
            <a [routerLink]="['/registro']" class="small text-decoration-none">Crear cuenta</a>
            <button type="submit" class="btn btn-primary px-4" [disabled]="loginForm.form.invalid">Ingresar</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
