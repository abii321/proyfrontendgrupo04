<div class="container mt-4">

  <h2 class="mb-4">Nueva Solicitud</h2>

  <!-- Formulario -->
  <form>
    <div class="mb-3">
      <label class="form-label">Título</label>
      <input type="text" class="form-control" [(ngModel)]="solicitud.titulo" name="titulo">
    </div>

    <div class="mb-3">
      <label class="form-label">Descripción</label>
      <textarea class="form-control" rows="3" [(ngModel)]="solicitud.descripcion" name="descripcion"></textarea>
    </div>

    <div class="mb-3">
      <label class="form-label">Precio</label>
      <input type="number" class="form-control" [(ngModel)]="solicitud.precio" name="precio">
    </div>

    <button type="button" class="btn btn-success" (click)="guardar()">
      <i class="bi bi-plus-circle"></i> Crear
    </button>
  </form>

  <hr class="my-4">

  <!-- Tabla -->
  <h3 class="mb-3">Solicitudes</h3>

  <div class="table-responsive">
    <table class="table table-striped table-hover align-middle">
      <thead class="table-dark">
        <tr>
          <th>Título</th>
          <th>Precio</th>
          <th>Estado</th>
          <th class="text-center">Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let s of solicitudes">
          <td>{{s.titulo}}</td>
          <td>{{s.precio | currency:'ARS'}}</td>
          <td>
            <span class="badge bg-info">{{s.estado}}</span>
          </td>
          <td class="text-center">
            <button class="btn btn-danger btn-sm" (click)="eliminar(s.id)">
              <i class="bi bi-trash"></i> Eliminar
            </button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

</div>
