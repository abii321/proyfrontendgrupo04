<div class="chat-container">
  <!-- Botón Flotante -->
  @if (!isOpen) {
    <button class="chat-fab" (click)="toggleChat()">
      <i class="bi bi-chat-dots-fill"></i>
    </button>
  }

  <!-- Panel de Chat -->
  @if (isOpen) {
    <div class="chat-panel shadow">
      <div class="chat-header p-3 d-flex justify-content-between align-items-center">
        <h5 class="m-0"><i class="bi bi-robot me-2"></i>Asistente Virtual</h5>
        <button type="button" class="btn-close btn-close-white" aria-label="Close" (click)="toggleChat()"></button>
      </div>
      
      <div class="chat-messages p-3" #scrollMe>
        @for (msg of messages; track msg) {
          <div class="message-wrapper d-flex mb-3" [ngClass]="{'justify-content-end': msg.sender === 'user'}">
            <div class="message p-3 rounded" [ngClass]="msg.sender === 'user' ? 'user-message ms-4' : 'bot-message me-4'">
              {{ msg.text }}
            </div>
          </div>
        }
        
        @if (isTyping) {
          <div class="message-wrapper d-flex mb-3">
            <div class="message p-3 rounded bot-message me-4 typing-indicator">
              <span></span><span></span><span></span>
            </div>
          </div>
        }
      </div>
      
      <div class="chat-footer p-3">
        <div class="input-group">
          <input type="text" class="form-control rounded-pill me-2 custom-input" placeholder="Escribe tu mensaje..." 
                 [(ngModel)]="newMessage" (keyup.enter)="sendMessage()" [disabled]="isTyping">
          <button class="btn custom-btn-send rounded-circle shadow-sm" type="button" (click)="sendMessage()" [disabled]="isTyping || !newMessage.trim()">
            <i class="bi bi-send-fill"></i>
          </button>
        </div>
      </div>
    </div>
  }
</div>
