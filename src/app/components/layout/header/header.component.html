<nav class="navbar navbar-expand-lg navbar-dark bg-primary">

  <div class="container">

    <a class="navbar-brand fw-bold" [routerLink]="['/home']">
      Tutorías
    </a>

    <button
      class="navbar-toggler"
      type="button"
      data-bs-toggle="collapse"
      data-bs-target="#navbarNav">

      <span class="navbar-toggler-icon"></span>

    </button>

    <div class="collapse navbar-collapse" id="navbarNav">

      <!-- Menú izquierdo -->
      <ul class="navbar-nav me-auto">

        <li class="nav-item">
          <a
            class="nav-link"
            routerLink="/home"
            routerLinkActive="active">

            Inicio

          </a>
        </li>

        @if(autenticacionService.userLoggedIn()){

        <li class="nav-item">
          <a
            class="nav-link"
            routerLink="/solicitud-ayuda"
            routerLinkActive="active">

            Solicitudes de ayuda

          </a>
        </li>

        }

      </ul>

      <!-- Menú derecho -->
      <div class="d-flex align-items-center gap-3">

        @if(!autenticacionService.userLoggedIn()){

        <button
          class="btn btn-outline-light"
          routerLink="/login">

          Iniciar sesión

        </button>

        <button
          class="btn btn-light text-primary"
          routerLink="/registro">

          Registrarse

        </button>

        }@else{

        <span class="text-white">

          Bienvenido,
          <strong>{{autenticacionService.userLogged()}}</strong>

        </span>

        <button
          class="btn btn-outline-light"
          routerLink="/home"
          (click)="autenticacionService.logout()">

          Cerrar sesión

        </button>

        }

      </div>

    </div>

  </div>

</nav>
