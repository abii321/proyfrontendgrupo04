<nav class="navbar navbar-expand-lg navbar-light bg-body-secondary border-bottom py-3 px-4">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold text-dark" style="letter-spacing: -0.5px;"
      [routerLink]="autenticacionService.userLoggedIn() ? ['home'] : ['login']">App</a>

    <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
      aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>

    </button>

    <div class="collapse navbar-collapse" id="navbarNav">
      @if (autenticacionService.userLoggedIn()) {
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">

        <li class="nav-item">
          <a class="nav-link px-3 fw-medium text-secondary" [routerLink]="['home']" routerLinkActive="active text-dark" >Inicio</a>
        </li>
        <!--<li class="nav-item">
          <a class="nav-link px-3 fw-medium text-secondary" 
             [routerLink]="autenticacionService.getUserRole() === 'profesor' ? ['gestion-tutoria'] : ['solicitar-tutoria']"*/
             routerLinkActive="active text-dark">App</a>
        </li>
        @if (autenticacionService.getUserRole() !== 'profesor') {-->
          <li class="nav-item">
            <a class="nav-link px-3 fw-medium text-secondary" [routerLink]="['solicitud-ayuda']"
              routerLinkActive="active text-dark">Tareas</a>
          </li>
        <!--}-->

        <li class="nav-item">
          <a class="nav-link px-3 fw-medium text-secondary" routerLinkActive="active text-dark"
            [routerLink]="['mis-solicitudes']">Mis solicitudes</a>
        </li>
        <li class="nav-item">
          <a class="nav-link px-3 fw-medium text-secondary"
            routerLinkActive="active text-dark" [routerLink]="['dashboard']">Dashboard</a>
        </li>
      </ul>
      }

      <div class="d-flex align-items-center gap-3 ms-auto">

        <a class="btn btn-sm btn-primary py-2 px-3 fw-semibold text-white rounded-2" [routerLink]="['registro']"

        } @else {
        <a class="text-secondary small d-flex align-items-center gap-2 fw-medium text-decoration-none"
          [routerLink]="['/perfil']" title="Ver Perfil">
          <i class="bi bi-person-circle fs-5 text-secondary"></i>
          {{ autenticacionService.userLogged() }}
        </a>
        <button class="btn btn-sm btn-secondary rounded-2 py-1 px-3" (click)="autenticacionService.logout()"

          Salir
        </button>
