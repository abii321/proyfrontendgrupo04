<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm sticky-top">
  <div class="container">
    <a class="navbar-brand fw-bold fs-5"
      [routerLink]="autenticacionService.userLoggedIn() ? ['home'] : ['login']">Tutorias<span
        style="color: blue;">.</span>com</a>

    <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
      aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarNav">
      @if (autenticacionService.userLoggedIn()) {
      <ul class="navbar-nav me-auto mb-2 mb-lg-0 small">
        <li class="nav-item">
          <a class="nav-link px-3" [routerLink]="['home']" routerLinkActive="active rounded-pill bg-light"
            [routerLinkActiveOptions]="{exact: true}">Inicio</a>
        </li>
        <li class="nav-item">
          <a class="nav-link px-3" [routerLink]="['solicitar-tutoria']"
            routerLinkActive="active rounded-pill bg-light">Tutorías</a>
        </li>
        <li class="nav-item">
          <a class="nav-link px-3" [routerLink]="['solicitud-ayuda']"
            routerLinkActive="active rounded-pill bg-light">Tareas</a>
        </li>
        <li class="nav-item">
          <a class="nav-link px-3" [routerLink]="['mis-solicitudes']"
            routerLinkActive="active rounded-pill bg-light">Mis Solicitudes</a>
        </li>
        <li class="nav-item">
          <a class="nav-link px-3" [routerLink]="['dashboard']"
            routerLinkActive="active rounded-pill bg-light">Dashboard</a>
        </li>
      </ul>
      }

      <div class="d-flex align-items-center ms-auto gap-2">
        @if (!autenticacionService.userLoggedIn()){
        <a class="btn btn-sm btn-link text-decoration-none text-dark fw-semibold" [routerLink]="['login']">
          Iniciar Sesión
        </a>
        <a class="btn btn-sm btn-dark py-2 px-3 fw-semibold" [routerLink]="['registro']">
          Registrarse
        </a>
        } @else {
        <li class="nav-item dropdown list-unstyled">
          <a class="nav-link dropdown-toggle d-flex align-items-center gap-2" href="#" role="button"
            data-bs-toggle="dropdown" aria-expanded="false">
            <i class="bi bi-person-circle fs-5"></i>
            <span class="fw-semibold small">{{ autenticacionService.userLogged() || 'Mi Cuenta' }}</span>
          </a>
          <ul class="dropdown-menu dropdown-menu-end shadow border-0 mt-2">
            <li>
              <button class="dropdown-item d-flex align-items-center gap-2" [routerLink]="['/perfil']"> <span>Ver perfil</span> </button>
            </li>

            <li> <span class="dropdown-header text-muted pb-2">Sesión activa</span> </li>

            <li>
              <hr class="dropdown-divider">
            </li>
            <li>
              <button class="dropdown-item text-danger d-flex align-items-center gap-2" [routerLink]="['/home']"
                (click)="autenticacionService.logout()">
                Cerrar Sesión
              </button>
            </li>
          </ul>
        </li>
        }
      </div>
    </div>
  </div>
</nav>
